apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devloop-demo-production
  namespace: argocd
  annotations:
    argo.octopus.com/project.devloop-demo-source: "attestation-and-validation-container-images"
    argo.octopus.com/environment.devloop-demo-source: "production"
spec:
  project: default
  source:
    repoURL: https://github.com/creid-octopus/composite-development-loop.git
    targetRevision: HEAD
    path: k8s/production
    name: devloop-demo-source
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      createNamespace: true
