apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-demo-production
  namespace: argocd
  annotations:
    argo.octopus.com/project.argo-demo-source: "argo-cd-rollback-sample"
    argo.octopus.com/environment.argo-demo-source: "production"
spec:
  project: default
  source:
    repoURL: https://github.com/creid-octopus/argocd-octopus-demo.git
    targetRevision: HEAD
    path: manifests/production
    name: argo-demo-source
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
